<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentinelAuth OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: "#f4c95d",
            glass: "rgba(255,255,255,0.08)",
          },
          boxShadow: {
            glow: "0 24px 70px rgba(0,0,0,0.45)",
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(10px)" },
              "100%": { opacity: "1", transform: "translateY(0)" },
            },
            slideIn: {
              "0%": { opacity: "0", transform: "translateX(22px)" },
              "100%": { opacity: "1", transform: "translateX(0)" },
            },
            pop: {
              "0%": { transform: "scale(0.6)", opacity: "0" },
              "70%": { transform: "scale(1.08)", opacity: "1" },
              "100%": { transform: "scale(1)", opacity: "1" },
            },
          },
          animation: {
            fadeUp: "fadeUp .35s ease-out",
            slideIn: "slideIn .28s ease-out",
            pop: "pop .34s ease-out",
          },
        },
      },
    };
  </script>
  <style>
    html, body, #root {
      max-width: 100%;
      overflow-x: hidden;
      line-height: 1.45;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(12px);
    }

    .bg-auth {
      background:
        radial-gradient(circle at 8% 8%, rgba(244, 201, 93, 0.22), transparent 34%),
        radial-gradient(circle at 92% 10%, rgba(45, 212, 191, 0.18), transparent 30%),
        linear-gradient(145deg, #081621, #0d2635 52%, #123f49);
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #e2e8f0;
      transition: background-color 9999s ease-out 0s;
      box-shadow: 0 0 0px 1000px rgba(15, 23, 42, 0.55) inset;
    }

    .safe-bottom {
      padding-bottom: calc(6rem + env(safe-area-inset-bottom));
    }

    .ripple {
      position: absolute;
      border-radius: 9999px;
      transform: scale(0);
      animation: ripple 600ms linear;
      background: rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.05rem;
      }

      h2 {
        font-size: 1rem;
      }

      .mobile-stack {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body class="bg-auth min-h-screen text-slate-100">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useMemo, useRef, useState } = React;

    const steps = [
      { id: 0, label: "Create" },
      { id: 1, label: "Login" },
      { id: 2, label: "Verify" },
      { id: 3, label: "Profile" },
    ];

    const initialOtp = ["", "", "", "", "", ""];

    function cls(...arr) {
      return arr.filter(Boolean).join(" ");
    }

    function IconWrap({ children }) {
      return (
        <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">{children}</div>
      );
    }

    function FloatingInput({ id, label, type = "text", value, onChange, error, icon }) {
      const hasValue = String(value || "").length > 0;
      return (
        <div className="space-y-1">
          <div className="relative">
            {icon && <IconWrap>{icon}</IconWrap>}
            <input
              id={id}
              type={type}
              value={value}
              onChange={onChange}
              placeholder=" "
              className={cls(
                "peer w-full rounded-2xl border bg-slate-900/45 pr-3 pt-5 pb-2 text-slate-100 outline-none transition",
                icon ? "pl-10" : "pl-3",
                "border-slate-200/20 focus:border-accent/90 focus:ring-2 focus:ring-accent/20",
                error && "border-rose-400/70"
              )}
            />
            <label
              htmlFor={id}
              className={cls(
                "pointer-events-none absolute -translate-y-1/2 transition-all",
                icon ? "left-10" : "left-3",
                hasValue
                  ? "top-3 text-xs text-accent"
                  : "top-1/2 text-sm text-slate-400 peer-focus:top-3 peer-focus:text-xs peer-focus:text-accent"
              )}
            >
              {label}
            </label>
          </div>
          {error && <p className="text-xs text-rose-300">{error}</p>}
        </div>
      );
    }

    function PasswordStrength({ password }) {
      const meter = useMemo(() => {
        let score = 0;
        if (password.length >= 12) score += 1;
        if (/[A-Z]/.test(password)) score += 1;
        if (/[a-z]/.test(password)) score += 1;
        if (/[0-9]/.test(password)) score += 1;
        if (/[^A-Za-z0-9]/.test(password)) score += 1;
        return score;
      }, [password]);

      const text = ["Very weak", "Weak", "Fair", "Good", "Strong", "Excellent"][meter];
      const widths = ["w-1/6", "w-2/6", "w-3/6", "w-4/6", "w-5/6", "w-full"];
      const colors = ["bg-rose-500", "bg-rose-400", "bg-amber-400", "bg-yellow-400", "bg-lime-400", "bg-emerald-400"];

      return (
        <div className="space-y-1">
          <div className="h-2 rounded-full bg-slate-800/80">
            <div className={cls("h-2 rounded-full transition-all", widths[meter], colors[meter])}></div>
          </div>
          <p className="text-xs text-slate-300">Password strength: <span className="font-semibold">{text}</span></p>
        </div>
      );
    }

    function RippleButton({ label, onClick, disabled, tone = "accent" }) {
      const btnRef = useRef(null);
      const classes = tone === "ghost"
        ? "border border-white/20 bg-white/5 text-slate-200"
        : "bg-accent text-slate-900";

      const addRipple = (e) => {
        const btn = btnRef.current;
        if (!btn) return;
        const circle = document.createElement("span");
        const diameter = Math.max(btn.clientWidth, btn.clientHeight);
        const radius = diameter / 2;
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${e.clientX - btn.getBoundingClientRect().left - radius}px`;
        circle.style.top = `${e.clientY - btn.getBoundingClientRect().top - radius}px`;
        circle.className = "ripple";
        const old = btn.getElementsByClassName("ripple")[0];
        if (old) old.remove();
        btn.appendChild(circle);
      };

      return (
        <button
          ref={btnRef}
          disabled={disabled}
          onMouseDown={addRipple}
          onClick={onClick}
          className={cls(
            "relative overflow-hidden w-full rounded-2xl px-4 py-3.5 font-semibold transition active:scale-[0.99]",
            classes,
            "disabled:cursor-not-allowed disabled:opacity-60"
          )}
        >
          {label}
        </button>
      );
    }

    function OtpSlots({ values, setValues }) {
      const refs = useRef([]);

      const onChange = (index, v) => {
        const ch = v.replace(/\D/g, "").slice(-1);
        const next = [...values];
        next[index] = ch;
        setValues(next);
        if (ch && index < 5) refs.current[index + 1]?.focus();
      };

      const onKeyDown = (index, e) => {
        if (e.key === "Backspace" && !values[index] && index > 0) refs.current[index - 1]?.focus();
      };

      const onPaste = (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);
        if (!text) return;
        const next = [...values];
        for (let i = 0; i < 6; i++) next[i] = text[i] || "";
        setValues(next);
      };

      return (
        <div className="space-y-2">
          <div className="flex gap-2" onPaste={onPaste}>
            {values.map((val, i) => (
              <input
                key={i}
                ref={(el) => refs.current[i] = el}
                value={val}
                onChange={(e) => onChange(i, e.target.value)}
                onKeyDown={(e) => onKeyDown(i, e)}
                inputMode="numeric"
                autoComplete={i === 0 ? "one-time-code" : "off"}
                className="h-14 w-12 rounded-2xl border border-slate-300/20 bg-slate-900/45 text-center text-xl tracking-widest outline-none transition focus:border-accent/90 focus:ring-2 focus:ring-accent/25"
              />
            ))}
          </div>
          <p className="text-xs text-slate-400">Tip: you can paste full 6-digit OTP.</p>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(1);
      const [loading, setLoading] = useState(false);
      const [errors, setErrors] = useState({});
      const [banner, setBanner] = useState({ type: "", text: "" });

      const [reg, setReg] = useState({ username: "", email: "", password: "", role: "user" });
      const [login, setLogin] = useState({ username: "", password: "" });

      const [mfaToken, setMfaToken] = useState("");
      const [otp, setOtp] = useState(initialOtp);
      const [mfaMethod, setMfaMethod] = useState("email");
      const [deliveryHint, setDeliveryHint] = useState("");

      const [mfaSetup, setMfaSetup] = useState({ uri: "", qr: "" });
      const [tokens, setTokens] = useState({ access: "" });
      const [profile, setProfile] = useState(null);
      const [sessionRole, setSessionRole] = useState("");
      const [verified, setVerified] = useState(false);
      const [showCheck, setShowCheck] = useState(false);
      const [showUsersModal, setShowUsersModal] = useState(false);
      const [usersList, setUsersList] = useState([]);
      const [usersLoading, setUsersLoading] = useState(false);
      const [loadingAdminQr, setLoadingAdminQr] = useState(false);

      const isAdmin = (sessionRole || profile?.role) === "admin";

      const otpCode = otp.join("");

      const pulse = (ok) => {
        if (typeof navigator !== "undefined" && navigator.vibrate) {
          navigator.vibrate(ok ? 25 : [25, 50, 25]);
        }
      };

      const showBanner = (text, type = "ok") => {
        setBanner({ text, type });
      };

      const parseError = (err) => {
        const d = err?.data?.detail;
        if (!d) return "Request failed. Please try again.";
        if (String(d).includes("Username already exists")) return "Username already taken. Try a different one.";
        if (String(d).includes("Email already exists")) return "Email already used. Use plus-tag (name+1@gmail.com).";
        return String(d);
      };

      const roleFromJwt = (token) => {
        try {
          const payload = JSON.parse(atob((token || "").split(".")[1] || ""));
          return String(payload?.role || "").toLowerCase();
        } catch {
          return "";
        }
      };

      const api = async (path, method, body, token) => {
        const headers = { "Content-Type": "application/json" };
        if (token) headers.Authorization = "Bearer " + token;
        const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined, credentials: "include" });
        const txt = await res.text();
        let data;
        try { data = JSON.parse(txt); } catch { data = txt; }
        if (!res.ok) throw { status: res.status, data };
        return data;
      };

      const copy = async (val, label) => {
        if (!val) return;
        try {
          await navigator.clipboard.writeText(val);
          pulse(true);
          showBanner(label + " copied", "ok");
        } catch {
          pulse(false);
          showBanner("Copy failed", "error");
        }
      };

      const onRegister = async () => {
        const nextErrors = {};
        if (!reg.username.trim()) nextErrors.username = "Username required";
        if (!reg.email.trim()) nextErrors.email = "Email required";
        if (!reg.password) nextErrors.password = "Password required";
        setErrors(nextErrors);
        if (Object.keys(nextErrors).length) return;

        try {
          setLoading(true);
          const data = await api("/api/register", "POST", { ...reg, username: reg.username.trim(), email: reg.email.trim() });
          setMfaSetup({ uri: data.mfa_setup_uri || "", qr: data.qr_code_data_uri || "" });
          setLogin({ username: reg.username.trim(), password: reg.password });
          setStep(1);
          pulse(true);
          showBanner("Account created. Scan QR before login.", "ok");
        } catch (err) {
          pulse(false);
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onLogin = async () => {
        if (!login.username.trim() || !login.password) {
          showBanner("Enter username and password", "error");
          return;
        }

        try {
          setLoading(true);
          const data = await api("/api/login", "POST", { username: login.username.trim(), password: login.password });
          setMfaToken(data.mfa_token || "");
          setMfaMethod((data.mfa_method || "email").toLowerCase());
          setDeliveryHint(data.delivery_hint || "");
          setStep(2);
          pulse(true);
          showBanner(data.delivery_hint || "Login successful. Enter OTP now.", "ok");
        } catch (err) {
          pulse(false);
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const loadAdminAuthenticatorQr = async () => {
        if (!login.username.trim() || !login.password) {
          showBanner("Enter admin username and password first.", "error");
          return;
        }
        try {
          setLoadingAdminQr(true);
          const data = await api("/api/bootstrap-admin/mfa-setup", "POST", {
            username: login.username.trim(),
            password: login.password,
          });
          setMfaSetup({ uri: data.mfa_setup_uri || "", qr: data.qr_code_data_uri || "" });
          showBanner("Authenticator QR loaded.", "ok");
        } catch (err) {
          showBanner(parseError(err), "error");
        } finally {
          setLoadingAdminQr(false);
        }
      };

      const onVerify = async () => {
        if (!mfaToken.trim()) {
          showBanner("MFA token missing. Login first.", "error");
          return;
        }
        if (otpCode.length !== 6) {
          showBanner("Enter valid 6-digit OTP.", "error");
          return;
        }

        try {
          setLoading(true);
          const data = await api("/api/verify-mfa", "POST", { mfa_token: mfaToken.trim(), otp: otpCode });
          const accessToken = data.access_token || "";
          setTokens({ access: accessToken });
          setSessionRole(roleFromJwt(accessToken));
          if (accessToken) {
            const me = await api("/api/me", "GET", null, accessToken);
            setProfile(me);
          }
          setVerified(true);
          setShowCheck(true);
          pulse(true);
          showBanner("MFA verified. Welcome!", "ok");
          setTimeout(() => {
            setShowCheck(false);
            setStep(3);
          }, 650);
        } catch (err) {
          pulse(false);
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onProfile = async () => {
        if (!tokens.access) {
          showBanner("Access token missing.", "error");
          return;
        }
        try {
          setLoading(true);
          const data = await api("/api/me", "GET", null, tokens.access);
          setProfile(data);
          pulse(true);
          showBanner("Profile fetched", "ok");
        } catch (err) {
          pulse(false);
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onLogout = async () => {
        try {
          await api("/api/logout", "POST", null, tokens.access || null);
        } catch {
          // We still clear local state even if backend token is already expired.
        }
        setTokens({ access: "" });
        setProfile(null);
        setSessionRole("");
        setShowUsersModal(false);
        setUsersList([]);
        setMfaToken("");
        setMfaMethod("email");
        setDeliveryHint("");
        setOtp([...initialOtp]);
        setStep(1);
        showBanner("Logged out", "ok");
      };

      const formatDate = (raw) => {
        if (!raw) return "-";
        const d = new Date(raw);
        if (Number.isNaN(d.getTime())) return "-";
        return d.toLocaleString();
      };

      const openUsersModal = async () => {
        if (!tokens.access) {
          showBanner("Verify OTP and fetch token first.", "error");
          return;
        }
        if (!isAdmin) {
          showBanner("Only admin can manage users.", "error");
          return;
        }

        setShowUsersModal(true);
        try {
          setUsersLoading(true);
          // UI interaction: load all users only when modal is opened.
          const data = await api("/api/users", "GET", null, tokens.access);
          setUsersList(Array.isArray(data) ? data : []);
        } catch (err) {
          showBanner(parseError(err), "error");
          if (err?.status === 403) {
            showBanner("Only admin can manage users.", "error");
          }
        } finally {
          setUsersLoading(false);
        }
      };

      const deleteUser = async (userId) => {
        if (!tokens.access || !userId) return;
        const target = usersList.find((u) => u.id === userId);
        if (target && target.role === "admin") {
          showBanner("Admin cannot be removed", "error");
          return;
        }
        // UI interaction: confirm before deletion to prevent accidental removal.
        const confirmed = window.confirm("Delete this user?");
        if (!confirmed) return;

        try {
          await api(`/api/users/${userId}`, "DELETE", null, tokens.access);
          // UI interaction: remove row instantly without reloading.
          setUsersList((prev) => prev.filter((u) => u.id !== userId));
          showBanner("User deleted", "ok");
        } catch (err) {
          showBanner(parseError(err), "error");
        }
      };

      const nextLabel = [
        loading ? "Creating..." : "Create Account",
        loading ? "Signing in..." : "Login",
        loading ? "Verifying..." : "Verify OTP",
        loading ? "Loading Profile..." : "Refresh Profile",
      ][step];

      const nextAction = [onRegister, onLogin, onVerify, onProfile][step];

      const prevEnabled = step > 0 && !loading && !showCheck;

      return (
        <div className="mx-auto min-h-screen w-full max-w-md px-4 py-4">
          <section className="glass relative flex min-h-[calc(100vh-2rem)] flex-col rounded-[30px] shadow-glow overflow-hidden">
            <div className="px-5 pt-6">
              <div className="mobile-stack flex items-center justify-between gap-2">
                <div>
                  <p className="text-xs uppercase tracking-[0.18em] text-slate-300/90">SentinelAuth OS</p>
                  <h1 className="mt-1 text-xl font-semibold">Mobile Auth Flow</h1>
                </div>
                <div className="mobile-stack flex items-center gap-2">
                  {isAdmin && <button onClick={openUsersModal} className="w-full rounded-xl border border-white/20 px-3 py-2 text-xs text-slate-200 sm:w-auto">Admin Panel</button>}
                  {tokens.access && <button onClick={onLogout} className="w-full rounded-xl border border-white/20 px-3 py-2 text-xs text-slate-200 sm:w-auto">Logout</button>}
                  <a href="/docs" className="w-full rounded-xl border border-white/20 px-3 py-2 text-center text-xs text-slate-200 sm:w-auto">API</a>
                </div>
              </div>

              <div className="mt-5 flex items-center gap-2">
                {steps.map((s, idx) => (
                  <div key={s.id} className="flex-1">
                    <div className={cls(
                      "h-1.5 rounded-full transition-all",
                      idx <= step ? "bg-accent" : "bg-white/20"
                    )}></div>
                  </div>
                ))}
              </div>

              <div className="mt-3 flex justify-between text-[11px] text-slate-300">
                <span>Step {step + 1} of 4</span>
                <span>{steps[step].label}</span>
              </div>

              {banner.text && (
                <div className={cls(
                  "mt-4 rounded-xl border px-3 py-2 text-xs animate-fadeUp",
                  banner.type === "error" ? "border-rose-300/40 bg-rose-500/10 text-rose-200" : "border-emerald-300/40 bg-emerald-500/10 text-emerald-200"
                )}>
                  {banner.text}
                </div>
              )}
            </div>

            <div className="flex-1 min-h-0 overflow-y-auto px-5 pt-5 pb-4 animate-slideIn">
              {step === 0 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="text-lg font-semibold">Create Account</h2>
                    <p className="text-sm text-slate-300">Set up account + MFA in one smooth flow.</p>
                  </div>

                  <FloatingInput id="reg-user" label="Username" value={reg.username} onChange={(e) => setReg({ ...reg, username: e.target.value })} error={errors.username} icon="👤" />
                  <FloatingInput id="reg-email" label="Email" value={reg.email} onChange={(e) => setReg({ ...reg, email: e.target.value })} error={errors.email} icon="✉" />
                  <FloatingInput id="reg-pass" type="password" label="Password" value={reg.password} onChange={(e) => setReg({ ...reg, password: e.target.value })} error={errors.password} icon="🔒" />
                  <PasswordStrength password={reg.password} />

                  <button onClick={() => setStep(1)} className="rounded-xl border border-white/20 px-3 py-2 text-sm text-slate-200">Already have an account? Login</button>

                  {!!mfaSetup.qr && (
                    <div className="space-y-2 rounded-2xl border border-white/15 bg-slate-900/40 p-3">
                      <p className="text-xs text-slate-300">Scan this QR in Authenticator:</p>
                      <img src={mfaSetup.qr} alt="MFA QR" className="mx-auto w-44 rounded-xl bg-white p-2" />
                      <a href={mfaSetup.uri} className="inline-flex w-full items-center justify-center rounded-lg border border-accent/60 px-2 py-1 text-center text-[11px] text-accent">Open app</a>
                    </div>
                  )}
                </div>
              )}

              {step === 1 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="text-lg font-semibold">Login</h2>
                    <p className="text-sm text-slate-300">Use your account to request OTP challenge.</p>
                  </div>

                  {!!mfaSetup.qr && (
                    <div className="space-y-2 rounded-2xl border border-white/15 bg-slate-900/40 p-3">
                      <p className="text-xs text-slate-300">Scan this QR in Authenticator (if not done yet):</p>
                      <img src={mfaSetup.qr} alt="MFA QR" className="mx-auto w-44 rounded-xl bg-white p-2" />
                      <a href={mfaSetup.uri} className="inline-flex w-full items-center justify-center rounded-lg border border-accent/60 px-2 py-1 text-center text-[11px] text-accent">Open app</a>
                    </div>
                  )}

                  <FloatingInput id="login-user" label="Username" value={login.username} onChange={(e) => setLogin({ ...login, username: e.target.value })} icon="👤" />
                  <FloatingInput id="login-pass" type="password" label="Password" value={login.password} onChange={(e) => setLogin({ ...login, password: e.target.value })} icon="🔑" />
                  <p className="text-xs text-slate-400">Admin Panel appears after successful admin OTP login.</p>
                  {mfaMethod !== "email" && login.username.trim().toLowerCase() === "admin" && (
                    <button onClick={loadAdminAuthenticatorQr} className="w-full rounded-xl border border-white/20 px-3 py-2 text-sm text-slate-200" disabled={loadingAdminQr}>
                      {loadingAdminQr ? "Loading Authenticator QR..." : "Show Admin Authenticator QR"}
                    </button>
                  )}
                  <button onClick={() => setStep(0)} className="w-full rounded-xl border border-white/20 px-3 py-2 text-sm text-slate-200">New here? Create Account</button>
                </div>
              )}

              {step === 2 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="text-lg font-semibold">Verify OTP</h2>
                    <p className="text-sm text-slate-300">
                      {mfaMethod === "email" ? "Enter 6-digit code sent to your email." : "Enter 6-digit code from authenticator app."}
                    </p>
                  </div>

                  {deliveryHint && (
                    <div className="rounded-2xl border border-white/15 bg-slate-900/40 p-3 text-xs text-slate-300">
                      {deliveryHint}
                    </div>
                  )}

                  <div className="rounded-2xl border border-white/15 bg-slate-900/40 p-3">
                    <label className="mb-1 block text-xs text-slate-300">MFA Token</label>
                    <textarea value={mfaToken} onChange={(e) => setMfaToken(e.target.value)} rows="2" className="w-full rounded-xl border border-slate-300/20 bg-slate-950/50 p-2 text-xs outline-none" />
                    <button onClick={() => copy(mfaToken, "MFA token")} className="mt-2 rounded-lg border border-white/20 px-3 py-1.5 text-xs">Copy token</button>
                  </div>

                  <OtpSlots values={otp} setValues={setOtp} />

                  {showCheck && (
                    <div className="rounded-2xl border border-emerald-300/50 bg-emerald-500/10 p-4 text-center animate-pop">
                      <div className="mx-auto mb-2 grid h-12 w-12 place-items-center rounded-full bg-emerald-400/20 text-2xl text-emerald-200">✓</div>
                      <p className="text-sm text-emerald-200">Verified successfully</p>
                    </div>
                  )}
                </div>
              )}

              {step === 3 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="text-lg font-semibold">Profile Access</h2>
                    <p className="text-sm text-slate-300">Session is active. Use secure actions below.</p>
                  </div>

                  {isAdmin && (
                    <button onClick={openUsersModal} className="w-full rounded-xl border border-white/20 px-3 py-2 text-sm text-slate-200">
                      Open Admin Panel
                    </button>
                  )}

                  <div className="rounded-2xl border border-white/15 bg-slate-900/40 p-3 text-sm text-slate-300">
                    Access token is kept in memory and refresh token is stored in a secure HttpOnly cookie.
                  </div>

                  <button onClick={onLogout} className="rounded-xl border border-white/20 px-3 py-2 text-sm text-slate-200">Logout</button>

                  {profile && (
                    <pre className="max-h-44 overflow-auto rounded-2xl border border-white/15 bg-slate-900/40 p-3 text-xs">
                      {JSON.stringify(profile, null, 2)}
                    </pre>
                  )}
                </div>
              )}
            </div>

            <div className="mt-auto border-t border-white/10 bg-slate-950/30 px-5 pb-[calc(1rem+env(safe-area-inset-bottom))] pt-3">
              <div className="mb-2 flex items-center justify-between text-xs text-slate-300">
                <button disabled={!prevEnabled} onClick={() => setStep((s) => Math.max(0, s - 1))} className="disabled:opacity-40">Back</button>
                <span>{steps[step].label}</span>
              </div>
              <RippleButton label={nextLabel} onClick={nextAction} disabled={loading || showCheck} />
            </div>

            {showUsersModal && (
              <div className="fixed inset-0 z-30 grid place-items-end bg-slate-950/70 p-4 sm:place-items-center">
                <div className="glass w-full max-w-md rounded-2xl border border-white/20 p-4">
                  <div className="mb-3 flex items-center justify-between">
                    <h3 className="text-sm font-semibold">Admin Panel</h3>
                    <button onClick={() => setShowUsersModal(false)} className="rounded-lg border border-white/20 px-2 py-1 text-xs">Close</button>
                  </div>

                  {usersLoading ? (
                    <p className="text-xs text-slate-300">Loading users...</p>
                  ) : usersList.length === 0 ? (
                    <p className="text-xs text-slate-300">No users found.</p>
                  ) : (
                    <div className="max-h-[60vh] space-y-2 overflow-auto pr-1">
                      <div className="grid grid-cols-[1.2fr_1fr_auto] gap-2 rounded-xl border border-white/10 bg-slate-900/30 px-2 py-1 text-[11px] text-slate-300">
                        <span>Email / Username</span>
                        <span>User ID</span>
                        <span>Action</span>
                      </div>
                      {usersList.map((u) => (
                        <div key={u.id} className="rounded-xl border border-white/15 bg-slate-900/35 p-2.5 text-xs">
                          <div className="grid grid-cols-[1.2fr_1fr_auto] items-center gap-2">
                            <div>
                              <p className="truncate font-semibold text-slate-100">{u.email || u.username}</p>
                              <p className="text-[11px] text-slate-400">{formatDate(u.created_at)}</p>
                            </div>
                            <p className="truncate text-slate-300">{u.id}</p>
                            {u.role === "admin" ? (
                              <span className="rounded-lg border border-amber-300/40 bg-amber-500/10 px-2 py-1 text-amber-200">Protected</span>
                            ) : (
                              <button onClick={() => deleteUser(u.id)} className="rounded-lg border border-rose-300/40 bg-rose-500/10 px-2 py-1 text-rose-200">Delete</button>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
