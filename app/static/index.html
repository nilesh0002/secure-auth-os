<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureAuthOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: "#f4c95d",
            glass: "rgba(255,255,255,0.07)",
          },
          boxShadow: {
            glow: "0 18px 60px rgba(0,0,0,0.42)",
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(10px)" },
              "100%": { opacity: "1", transform: "translateY(0)" },
            },
          },
          animation: {
            fadeUp: "fadeUp .35s ease-out",
          },
        },
      },
    };
  </script>
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(12px);
    }

    .bg-auth {
      background:
        radial-gradient(circle at 8% 12%, rgba(244, 201, 93, 0.2), transparent 34%),
        radial-gradient(circle at 92% 8%, rgba(34, 211, 238, 0.18), transparent 30%),
        linear-gradient(140deg, #0b1f2d, #0f3b44 55%, #0f2f3b);
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #e2e8f0;
      transition: background-color 9999s ease-out 0s;
      box-shadow: 0 0 0px 1000px rgba(15, 23, 42, 0.55) inset;
    }
  </style>
</head>
<body class="bg-auth min-h-screen text-slate-100">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useMemo, useRef, useState } = React;

    const steps = [
      { id: 0, label: "Create Account" },
      { id: 1, label: "Login" },
      { id: 2, label: "Verify OTP" },
      { id: 3, label: "Profile" },
    ];

    const initialOtp = ["", "", "", "", "", ""];

    function cls(...arr) {
      return arr.filter(Boolean).join(" ");
    }

    function FloatingInput({ id, label, type = "text", value, onChange, error }) {
      return (
        <div className="space-y-1">
          <div className="relative">
            <input
              id={id}
              type={type}
              value={value}
              onChange={onChange}
              placeholder=" "
              className={cls(
                "peer w-full rounded-xl border bg-slate-900/40 px-3 pt-5 pb-2 text-slate-100 outline-none transition",
                "border-slate-200/20 focus:border-accent/90 focus:ring-2 focus:ring-accent/20",
                error && "border-rose-400/70"
              )}
            />
            <label
              htmlFor={id}
              className="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-sm text-slate-400 transition-all peer-placeholder-shown:top-1/2 peer-focus:top-3 peer-focus:text-xs peer-focus:text-accent peer-not-placeholder-shown:top-3 peer-not-placeholder-shown:text-xs"
            >
              {label}
            </label>
          </div>
          {error && <p className="text-xs text-rose-300">{error}</p>}
        </div>
      );
    }

    function PasswordStrength({ password }) {
      const meter = useMemo(() => {
        let score = 0;
        if (password.length >= 12) score += 1;
        if (/[A-Z]/.test(password)) score += 1;
        if (/[a-z]/.test(password)) score += 1;
        if (/[0-9]/.test(password)) score += 1;
        if (/[^A-Za-z0-9]/.test(password)) score += 1;
        return score;
      }, [password]);

      const text = ["Very weak", "Weak", "Fair", "Good", "Strong", "Excellent"][meter];
      const widths = ["w-1/6", "w-2/6", "w-3/6", "w-4/6", "w-5/6", "w-full"];
      const colors = ["bg-rose-500", "bg-rose-400", "bg-amber-400", "bg-yellow-400", "bg-lime-400", "bg-emerald-400"];

      return (
        <div className="space-y-1">
          <div className="h-2 rounded-full bg-slate-800/80">
            <div className={cls("h-2 rounded-full transition-all", widths[meter], colors[meter])}></div>
          </div>
          <p className="text-xs text-slate-300">Password strength: <span className="font-semibold">{text}</span></p>
        </div>
      );
    }

    function Toasts({ toasts }) {
      return (
        <div className="fixed right-4 top-4 z-50 space-y-2">
          {toasts.map((t) => (
            <div key={t.id} className={cls(
              "glass animate-fadeUp rounded-xl px-4 py-3 text-sm shadow-glow",
              t.type === "error" ? "border-rose-300/40 text-rose-100" : "border-emerald-300/40 text-emerald-100"
            )}>
              {t.message}
            </div>
          ))}
        </div>
      );
    }

    function OtpSlots({ values, setValues }) {
      const refs = useRef([]);

      const onChange = (index, v) => {
        const ch = v.replace(/\D/g, "").slice(-1);
        const next = [...values];
        next[index] = ch;
        setValues(next);
        if (ch && index < 5) refs.current[index + 1]?.focus();
      };

      const onKeyDown = (index, e) => {
        if (e.key === "Backspace" && !values[index] && index > 0) refs.current[index - 1]?.focus();
      };

      const onPaste = (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);
        if (!text) return;
        const next = [...values];
        for (let i = 0; i < 6; i++) next[i] = text[i] || "";
        setValues(next);
      };

      return (
        <div className="space-y-2">
          <div className="flex gap-2" onPaste={onPaste}>
            {values.map((val, i) => (
              <input
                key={i}
                ref={(el) => refs.current[i] = el}
                value={val}
                onChange={(e) => onChange(i, e.target.value)}
                onKeyDown={(e) => onKeyDown(i, e)}
                inputMode="numeric"
                className="h-12 w-11 rounded-xl border border-slate-300/20 bg-slate-900/40 text-center text-lg tracking-widest outline-none transition focus:border-accent/90 focus:ring-2 focus:ring-accent/25"
              />
            ))}
          </div>
          <p className="text-xs text-slate-400">Tip: you can paste full 6-digit OTP.</p>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(0);
      const [loading, setLoading] = useState(false);
      const [toasts, setToasts] = useState([]);
      const [errors, setErrors] = useState({});

      const [reg, setReg] = useState({ username: "", email: "", password: "", role: "user" });
      const [login, setLogin] = useState({ username: "", password: "" });

      const [mfaToken, setMfaToken] = useState("");
      const [otp, setOtp] = useState(initialOtp);

      const [mfaSetup, setMfaSetup] = useState({ uri: "", qr: "" });
      const [tokens, setTokens] = useState({ access: "", refresh: "" });
      const [profile, setProfile] = useState(null);
      const [verified, setVerified] = useState(false);

      const otpCode = otp.join("");

      const pushToast = (message, type = "success") => {
        const id = Date.now() + Math.random();
        setToasts((s) => [...s, { id, message, type }]);
        setTimeout(() => setToasts((s) => s.filter((t) => t.id !== id)), 2600);
      };

      const parseError = (err) => {
        const d = err?.data?.detail;
        if (!d) return "Request failed. Please try again.";
        if (String(d).includes("Username already exists")) return "Username already taken. Try a different one.";
        if (String(d).includes("Email already exists")) return "Email already used. Use plus-tag (name+1@gmail.com).";
        return String(d);
      };

      const api = async (path, method, body, token) => {
        const headers = { "Content-Type": "application/json" };
        if (token) headers.Authorization = "Bearer " + token;
        const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined });
        const txt = await res.text();
        let data;
        try { data = JSON.parse(txt); } catch { data = txt; }
        if (!res.ok) throw { status: res.status, data };
        return data;
      };

      const copy = async (val, label) => {
        if (!val) return;
        try {
          await navigator.clipboard.writeText(val);
          pushToast(label + " copied");
        } catch {
          pushToast("Copy failed", "error");
        }
      };

      const onRegister = async () => {
        const nextErrors = {};
        if (!reg.username.trim()) nextErrors.username = "Username required";
        if (!reg.email.trim()) nextErrors.email = "Email required";
        if (!reg.password) nextErrors.password = "Password required";
        setErrors(nextErrors);
        if (Object.keys(nextErrors).length) return;

        try {
          setLoading(true);
          const data = await api("/api/register", "POST", { ...reg, username: reg.username.trim(), email: reg.email.trim() });
          setMfaSetup({ uri: data.mfa_setup_uri || "", qr: data.qr_code_data_uri || "" });
          setLogin({ username: reg.username.trim(), password: reg.password });
          setStep(1);
          pushToast("Account created. Scan QR before login.");
        } catch (err) {
          pushToast(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onLogin = async () => {
        if (!login.username.trim() || !login.password) {
          pushToast("Enter username and password", "error");
          return;
        }

        try {
          setLoading(true);
          const data = await api("/api/login", "POST", { username: login.username.trim(), password: login.password });
          setMfaToken(data.mfa_token || "");
          setStep(2);
          pushToast("Login successful. Enter OTP now.");
        } catch (err) {
          pushToast(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onVerify = async () => {
        if (!mfaToken.trim()) {
          pushToast("MFA token missing. Login first.", "error");
          return;
        }
        if (otpCode.length !== 6) {
          pushToast("Enter valid 6-digit OTP.", "error");
          return;
        }

        try {
          setLoading(true);
          const data = await api("/api/verify-mfa", "POST", { mfa_token: mfaToken.trim(), otp: otpCode });
          setTokens({ access: data.access_token || "", refresh: data.refresh_token || "" });
          setVerified(true);
          setStep(3);
          pushToast("MFA verified. Welcome!", "success");
        } catch (err) {
          pushToast(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onProfile = async () => {
        if (!tokens.access) {
          pushToast("Access token missing.", "error");
          return;
        }
        try {
          setLoading(true);
          const data = await api("/api/me", "GET", null, tokens.access);
          setProfile(data);
          pushToast("Profile fetched");
        } catch (err) {
          pushToast(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="relative min-h-screen p-4 md:p-8">
          <Toasts toasts={toasts} />

          <div className="mx-auto grid w-full max-w-7xl grid-cols-1 gap-6 lg:grid-cols-2">
            <section className="glass rounded-3xl p-6 shadow-glow lg:p-10 animate-fadeUp">
              <div className="mb-8 flex items-center gap-3">
                <div className="h-10 w-10 rounded-2xl bg-accent text-slate-900 font-extrabold grid place-items-center">S</div>
                <div>
                  <h1 className="text-2xl font-semibold tracking-tight">SecureAuthOS</h1>
                  <p className="text-sm text-slate-300">Enterprise-grade identity for modern teams</p>
                </div>
              </div>

              <div className="mb-8 rounded-2xl border border-white/20 bg-slate-900/35 p-5">
                <p className="text-sm text-slate-300 leading-6">
                  Multi-factor flow protects accounts end-to-end: account setup, credential verification,
                  OTP challenge, and tokenized access.
                </p>
              </div>

              <div className="space-y-3 text-sm text-slate-200">
                <div className="flex items-start gap-3"><span className="mt-1 h-2 w-2 rounded-full bg-accent"></span><p>Create your account with strong password rules.</p></div>
                <div className="flex items-start gap-3"><span className="mt-1 h-2 w-2 rounded-full bg-cyan-300"></span><p>Login generates a temporary MFA challenge token.</p></div>
                <div className="flex items-start gap-3"><span className="mt-1 h-2 w-2 rounded-full bg-emerald-300"></span><p>Authenticator OTP confirms identity before access.</p></div>
              </div>

              <div className="mt-8 rounded-2xl border border-white/15 bg-slate-950/30 p-5">
                <h3 className="font-medium">Need API docs?</h3>
                <a href="/docs" className="mt-2 inline-block text-sm text-accent hover:underline">Open Swagger /docs</a>
              </div>
            </section>

            <section className="glass rounded-3xl p-5 shadow-glow md:p-8 animate-fadeUp">
              <div className="mb-6">
                <ol className="grid grid-cols-2 gap-2 md:grid-cols-4">
                  {steps.map((s, idx) => (
                    <li key={s.id} className={cls(
                      "rounded-xl border px-3 py-2 text-xs md:text-sm transition",
                      step === idx && "border-accent bg-accent/15 text-accent",
                      step > idx && "border-emerald-400/50 bg-emerald-400/10 text-emerald-200",
                      step < idx && "border-white/20 bg-slate-900/35 text-slate-300"
                    )}>
                      {step > idx ? "✓ " : ""}{s.label}
                    </li>
                  ))}
                </ol>
              </div>

              {loading && (
                <div className="mb-4 animate-pulse space-y-2 rounded-xl border border-white/10 bg-slate-900/35 p-4">
                  <div className="h-3 w-32 rounded bg-slate-600/40"></div>
                  <div className="h-10 rounded bg-slate-600/30"></div>
                </div>
              )}

              {step === 0 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="text-xl font-semibold">Create your account</h2>
                    <p className="text-sm text-slate-300">Start secure onboarding with password policy + MFA.</p>
                  </div>

                  <FloatingInput id="reg-user" label="Username" value={reg.username} onChange={(e) => setReg({ ...reg, username: e.target.value })} error={errors.username} />
                  <FloatingInput id="reg-email" label="Email" value={reg.email} onChange={(e) => setReg({ ...reg, email: e.target.value })} error={errors.email} />
                  <FloatingInput id="reg-pass" type="password" label="Password" value={reg.password} onChange={(e) => setReg({ ...reg, password: e.target.value })} error={errors.password} />
                  <PasswordStrength password={reg.password} />

                  <button onClick={onRegister} disabled={loading} className="w-full rounded-xl bg-accent px-4 py-3 font-semibold text-slate-900 transition hover:brightness-105 disabled:opacity-60">
                    {loading ? "Creating..." : "Create Account"}
                  </button>

                  {!!mfaSetup.qr && (
                    <div className="space-y-3 rounded-2xl border border-white/15 bg-slate-900/40 p-4">
                      <p className="text-sm">Scan this QR in Authenticator app:</p>
                      <img src={mfaSetup.qr} alt="MFA QR" className="w-52 rounded-xl bg-white p-2" />
                      <a href={mfaSetup.uri} className="inline-block rounded-lg border border-accent/60 px-3 py-2 text-sm text-accent hover:bg-accent/10">Open Authenticator Link</a>
                    </div>
                  )}
                </div>
              )}

              {step === 1 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="text-xl font-semibold">Login</h2>
                    <p className="text-sm text-slate-300">Enter account credentials to receive MFA challenge.</p>
                  </div>

                  <FloatingInput id="login-user" label="Username" value={login.username} onChange={(e) => setLogin({ ...login, username: e.target.value })} />
                  <FloatingInput id="login-pass" type="password" label="Password" value={login.password} onChange={(e) => setLogin({ ...login, password: e.target.value })} />

                  <button onClick={onLogin} disabled={loading} className="w-full rounded-xl bg-accent px-4 py-3 font-semibold text-slate-900 transition hover:brightness-105 disabled:opacity-60">
                    {loading ? "Signing in..." : "Login"}
                  </button>
                </div>
              )}

              {step === 2 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="text-xl font-semibold">Verify OTP</h2>
                    <p className="text-sm text-slate-300">Enter your 6-digit authenticator code.</p>
                  </div>

                  <div className="rounded-xl border border-white/15 bg-slate-900/40 p-3">
                    <label className="mb-2 block text-xs text-slate-300">MFA token</label>
                    <div className="flex items-center gap-2">
                      <textarea value={mfaToken} onChange={(e) => setMfaToken(e.target.value)} rows="2" className="w-full rounded-lg border border-slate-300/20 bg-slate-950/50 p-2 text-xs outline-none" />
                      <button onClick={() => copy(mfaToken, "MFA token")} className="rounded-lg border border-white/20 px-3 py-2 text-xs hover:bg-white/10">Copy</button>
                    </div>
                  </div>

                  <OtpSlots values={otp} setValues={setOtp} />

                  <button onClick={onVerify} disabled={loading} className="w-full rounded-xl bg-accent px-4 py-3 font-semibold text-slate-900 transition hover:brightness-105 disabled:opacity-60">
                    {loading ? "Verifying..." : "Verify Code"}
                  </button>
                </div>
              )}

              {step === 3 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="text-xl font-semibold">Profile & Tokens</h2>
                    <p className="text-sm text-slate-300">You are authenticated. Fetch profile or copy tokens.</p>
                  </div>

                  {verified && (
                    <div className="relative overflow-hidden rounded-xl border border-emerald-300/40 bg-emerald-500/10 p-4">
                      <div className="absolute -right-2 -top-2 h-14 w-14 animate-ping rounded-full bg-emerald-300/20"></div>
                      <p className="font-medium text-emerald-200">Verification successful</p>
                    </div>
                  )}

                  <div className="space-y-3 rounded-xl border border-white/15 bg-slate-900/40 p-3">
                    <div>
                      <label className="text-xs text-slate-300">Access token</label>
                      <div className="mt-1 flex gap-2">
                        <textarea value={tokens.access} readOnly rows="2" className="w-full rounded-lg border border-slate-300/20 bg-slate-950/50 p-2 text-xs" />
                        <button onClick={() => copy(tokens.access, "Access token")} className="rounded-lg border border-white/20 px-3 py-2 text-xs hover:bg-white/10">Copy</button>
                      </div>
                    </div>
                    <div>
                      <label className="text-xs text-slate-300">Refresh token</label>
                      <div className="mt-1 flex gap-2">
                        <textarea value={tokens.refresh} readOnly rows="2" className="w-full rounded-lg border border-slate-300/20 bg-slate-950/50 p-2 text-xs" />
                        <button onClick={() => copy(tokens.refresh, "Refresh token")} className="rounded-lg border border-white/20 px-3 py-2 text-xs hover:bg-white/10">Copy</button>
                      </div>
                    </div>
                  </div>

                  <button onClick={onProfile} disabled={loading} className="w-full rounded-xl bg-accent px-4 py-3 font-semibold text-slate-900 transition hover:brightness-105 disabled:opacity-60">
                    {loading ? "Loading profile..." : "Get My Profile"}
                  </button>

                  {profile && (
                    <pre className="max-h-56 overflow-auto rounded-xl border border-white/15 bg-slate-900/50 p-3 text-xs text-slate-100">
                      {JSON.stringify(profile, null, 2)}
                    </pre>
                  )}
                </div>
              )}
            </section>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
