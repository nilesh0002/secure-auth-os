<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentinelAuth OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: "#ff6b4a",
            accent2: "#0f766e",
            paper: "rgba(255,255,255,0.84)",
          },
          boxShadow: {
            glow: "0 28px 80px rgba(15, 23, 42, 0.14)",
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(10px)" },
              "100%": { opacity: "1", transform: "translateY(0)" },
            },
            slideIn: {
              "0%": { opacity: "0", transform: "translateX(22px)" },
              "100%": { opacity: "1", transform: "translateX(0)" },
            },
            pop: {
              "0%": { transform: "scale(0.6)", opacity: "0" },
              "70%": { transform: "scale(1.08)", opacity: "1" },
              "100%": { transform: "scale(1)", opacity: "1" },
            },
          },
          animation: {
            fadeUp: "fadeUp .35s ease-out",
            slideIn: "slideIn .28s ease-out",
            pop: "pop .34s ease-out",
          },
        },
      },
    };
  </script>
  <style>
    html, body, #root {
      max-width: 100%;
      overflow-x: hidden;
      line-height: 1.45;
    }

    html {
      font-family: "Space Grotesk", sans-serif;
    }

    body {
      color: #0f172a;
    }

    .glass {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(18px) saturate(1.1);
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.12);
    }

    .bg-auth {
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 107, 74, 0.18), transparent 26%),
        radial-gradient(circle at 88% 14%, rgba(15, 118, 110, 0.15), transparent 24%),
        radial-gradient(circle at 50% 110%, rgba(245, 158, 11, 0.1), transparent 30%),
        linear-gradient(180deg, #f7f2eb 0%, #f2ebe1 40%, #ede6db 100%);
      position: relative;
    }

    .bg-auth::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 55%, transparent 100%);
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-text-fill-color: #0f172a;
      transition: background-color 9999s ease-out 0s;
      box-shadow: 0 0 0px 1000px rgba(255, 255, 255, 0.9) inset;
    }

    .safe-bottom {
      padding-bottom: calc(6rem + env(safe-area-inset-bottom));
    }

    .ripple {
      position: absolute;
      border-radius: 9999px;
      transform: scale(0);
      animation: ripple 600ms linear;
      background: rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 1.15rem;
      }

      h2 {
        font-size: 1.05rem;
      }

      .mobile-stack {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
  <body class="bg-auth min-h-screen text-slate-900">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useMemo, useRef, useState } = React;

    const steps = [
      { id: 0, label: "Create" },
      { id: 1, label: "Login" },
      { id: 2, label: "Verify" },
      { id: 3, label: "Profile" },
    ];

    const initialOtp = ["", "", "", "", "", ""];

    function cls(...arr) {
      return arr.filter(Boolean).join(" ");
    }

    function IconWrap({ children }) {
      return (
        <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">{children}</div>
      );
    }

    function FloatingInput({ id, label, type = "text", value, onChange, error, icon }) {
      const hasValue = String(value || "").length > 0;
      return (
        <div className="space-y-1">
          <div className="relative">
            {icon && <IconWrap>{icon}</IconWrap>}
            <input
              id={id}
              type={type}
              value={value}
              onChange={onChange}
              placeholder=" "
              className={cls(
                "peer w-full rounded-3xl border bg-white/90 pr-3 pt-5 pb-2 text-slate-900 shadow-[0_8px_24px_rgba(15,23,42,0.05)] outline-none transition",
                icon ? "pl-10" : "pl-3",
                "border-slate-200 focus:border-accent/80 focus:ring-2 focus:ring-accent/15",
                error && "border-rose-400/70"
              )}
            />
            <label
              htmlFor={id}
              className={cls(
                "pointer-events-none absolute -translate-y-1/2 transition-all",
                icon ? "left-10" : "left-3",
                hasValue
                  ? "top-3 text-xs text-accent"
                  : "top-1/2 text-sm text-slate-500 peer-focus:top-3 peer-focus:text-xs peer-focus:text-accent"
              )}
            >
              {label}
            </label>
          </div>
          {error && <p className="text-xs text-rose-300">{error}</p>}
        </div>
      );
    }

    function PasswordStrength({ password }) {
      const meter = useMemo(() => {
        let score = 0;
        if (password.length >= 12) score += 1;
        if (/[A-Z]/.test(password)) score += 1;
        if (/[a-z]/.test(password)) score += 1;
        if (/[0-9]/.test(password)) score += 1;
        if (/[^A-Za-z0-9]/.test(password)) score += 1;
        return score;
      }, [password]);

      const text = ["Very weak", "Weak", "Fair", "Good", "Strong", "Excellent"][meter];
      const widths = ["w-1/6", "w-2/6", "w-3/6", "w-4/6", "w-5/6", "w-full"];
      const colors = ["bg-rose-500", "bg-rose-400", "bg-amber-400", "bg-yellow-400", "bg-lime-400", "bg-emerald-400"];

      return (
        <div className="space-y-1">
          <div className="h-2 rounded-full bg-slate-200">
            <div className={cls("h-2 rounded-full transition-all", widths[meter], colors[meter])}></div>
          </div>
          <p className="text-xs text-slate-600">Password strength: <span className="font-semibold text-slate-900">{text}</span></p>
        </div>
      );
    }

    function RippleButton({ label, onClick, disabled, tone = "accent" }) {
      const btnRef = useRef(null);
      const classes = tone === "ghost"
        ? "border border-slate-200 bg-white text-slate-700"
        : "bg-[linear-gradient(135deg,#ff6b4a_0%,#ff9f43_100%)] text-white shadow-[0_18px_30px_rgba(255,107,74,0.22)]";

      const addRipple = (e) => {
        const btn = btnRef.current;
        if (!btn) return;
        const circle = document.createElement("span");
        const diameter = Math.max(btn.clientWidth, btn.clientHeight);
        const radius = diameter / 2;
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${e.clientX - btn.getBoundingClientRect().left - radius}px`;
        circle.style.top = `${e.clientY - btn.getBoundingClientRect().top - radius}px`;
        circle.className = "ripple";
        const old = btn.getElementsByClassName("ripple")[0];
        if (old) old.remove();
        btn.appendChild(circle);
      };

      return (
        <button
          ref={btnRef}
          disabled={disabled}
          onMouseDown={addRipple}
          onClick={onClick}
          className={cls(
            "relative overflow-hidden w-full rounded-2xl px-4 py-3.5 font-semibold transition active:scale-[0.99]",
            classes,
            "disabled:cursor-not-allowed disabled:opacity-60"
          )}
        >
          {label}
        </button>
      );
    }

    function OtpSlots({ values, setValues }) {
      const refs = useRef([]);

      const onChange = (index, v) => {
        const ch = v.replace(/\D/g, "").slice(-1);
        const next = [...values];
        next[index] = ch;
        setValues(next);
        if (ch && index < 5) refs.current[index + 1]?.focus();
      };

      const onKeyDown = (index, e) => {
        if (e.key === "Backspace" && !values[index] && index > 0) refs.current[index - 1]?.focus();
      };

      const onPaste = (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);
        if (!text) return;
        const next = [...values];
        for (let i = 0; i < 6; i++) next[i] = text[i] || "";
        setValues(next);
      };

      return (
        <div className="space-y-2">
          <div className="flex gap-2" onPaste={onPaste}>
            {values.map((val, i) => (
              <input
                key={i}
                ref={(el) => refs.current[i] = el}
                value={val}
                onChange={(e) => onChange(i, e.target.value)}
                onKeyDown={(e) => onKeyDown(i, e)}
                inputMode="numeric"
                autoComplete={i === 0 ? "one-time-code" : "off"}
                className="h-14 w-12 rounded-3xl border border-slate-200 bg-white text-center text-xl tracking-widest text-slate-900 shadow-[0_8px_24px_rgba(15,23,42,0.06)] outline-none transition focus:border-accent/80 focus:ring-2 focus:ring-accent/20"
              />
            ))}
          </div>
          <p className="text-xs text-slate-500">Tip: you can paste full 6-digit OTP.</p>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(1);
      const [loading, setLoading] = useState(false);
      const [errors, setErrors] = useState({});
      const [banner, setBanner] = useState({ type: "", text: "" });

      const [reg, setReg] = useState({ username: "", email: "", password: "", role: "user" });
      const [login, setLogin] = useState({ username: "", password: "" });
      const [forgotOpen, setForgotOpen] = useState(false);
      const [forgot, setForgot] = useState({ email: "", token: "", newPassword: "" });

      const [mfaToken, setMfaToken] = useState("");
      const [otp, setOtp] = useState(initialOtp);
      const [mfaMethod, setMfaMethod] = useState("email");

      const [mfaSetup, setMfaSetup] = useState({ uri: "", qr: "" });
      const [tokens, setTokens] = useState({ access: "" });
      const [profile, setProfile] = useState(null);
      const [sessionRole, setSessionRole] = useState("");
      const [verified, setVerified] = useState(false);
      const [showCheck, setShowCheck] = useState(false);
      const [showUsersModal, setShowUsersModal] = useState(false);
      const [usersList, setUsersList] = useState([]);
      const [usersLoading, setUsersLoading] = useState(false);
      const [loadingAdminQr, setLoadingAdminQr] = useState(false);

      const isAdmin = (sessionRole || profile?.role) === "admin";

      const otpCode = otp.join("");

      const pulse = (ok) => {
        if (typeof navigator !== "undefined" && navigator.vibrate) {
          navigator.vibrate(ok ? 25 : [25, 50, 25]);
        }
      };

      const showBanner = (text, type = "ok") => {
        setBanner({ text, type });
      };

      const parseError = (err) => {
        const d = err?.data?.detail;
        if (!d) return "Request failed. Please try again.";
        if (String(d).includes("Username already exists")) return "Username already taken. Try a different one.";
        if (String(d).includes("Email already exists")) return "Email already used. Use plus-tag (name+1@gmail.com).";
        return String(d);
      };

      const isStrongPassword = (password) => {
        if (!password || password.length < 12) return false;
        if (!/[A-Z]/.test(password)) return false;
        if (!/[a-z]/.test(password)) return false;
        if (!/[0-9]/.test(password)) return false;
        if (!/[^A-Za-z0-9]/.test(password)) return false;
        return true;
      };

      const roleFromJwt = (token) => {
        try {
          const payload = JSON.parse(atob((token || "").split(".")[1] || ""));
          return String(payload?.role || "").toLowerCase();
        } catch {
          return "";
        }
      };

      const api = async (path, method, body, token) => {
        const headers = { "Content-Type": "application/json" };
        if (token) headers.Authorization = "Bearer " + token;
        const res = await fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined, credentials: "include" });
        const txt = await res.text();
        let data;
        try { data = JSON.parse(txt); } catch { data = txt; }
        if (!res.ok) throw { status: res.status, data };
        return data;
      };

      const copy = async (val, label) => {
        if (!val) return;
        try {
          await navigator.clipboard.writeText(val);
          pulse(true);
          showBanner(label + " copied", "ok");
        } catch {
          pulse(false);
          showBanner("Copy failed", "error");
        }
      };

      const onRegister = async () => {
        const nextErrors = {};
        if (!reg.username.trim()) nextErrors.username = "Username required";
        if (!reg.email.trim()) nextErrors.email = "Email required";
        if (!reg.password) nextErrors.password = "Password required";
        setErrors(nextErrors);
        if (Object.keys(nextErrors).length) return;

        try {
          setLoading(true);
          const data = await api("/api/register", "POST", { ...reg, username: reg.username.trim(), email: reg.email.trim() });
          setMfaSetup({ uri: data.mfa_setup_uri || "", qr: data.qr_code_data_uri || "" });
          setLogin({ username: reg.username.trim(), password: reg.password });
          setStep(1);
          pulse(true);
          showBanner("Account created. Scan QR before login.", "ok");
        } catch (err) {
          pulse(false);
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onLogin = async () => {
        if (!login.username.trim() || !login.password) {
          showBanner("Enter username and password", "error");
          return;
        }

        try {
          setLoading(true);
          const data = await api("/api/login", "POST", { username: login.username.trim(), password: login.password });
          setMfaToken(data.mfa_token || "");
          setMfaMethod((data.mfa_method || "totp").toLowerCase());
          setStep(2);
          pulse(true);
          showBanner("Login successful. Open your authenticator app and enter the code.", "ok");
        } catch (err) {
          pulse(false);
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onForgotPasswordRequest = async () => {
        if (!forgot.email.trim()) {
          showBanner("Enter your account email for reset", "error");
          return;
        }

        try {
          setLoading(true);
          const data = await api("/api/forgot-password", "POST", { email: forgot.email.trim() });
          if (data?.debug_reset_token) {
            setForgot((prev) => ({ ...prev, token: data.debug_reset_token }));
            showBanner("Reset token generated (test mode). Check the form below.", "ok");
          } else {
            showBanner(data?.detail || "If the account exists, reset instructions were sent.", "ok");
          }
        } catch (err) {
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onResetPassword = async () => {
        if (!forgot.token.trim() || !forgot.newPassword) {
          showBanner("Enter reset token and new password", "error");
          return;
        }
        if (!isStrongPassword(forgot.newPassword)) {
          showBanner("Password must be 12+ chars with uppercase, lowercase, number, and special character.", "error");
          return;
        }

        try {
          setLoading(true);
          const data = await api("/api/reset-password", "POST", { token: forgot.token.trim(), new_password: forgot.newPassword });
          showBanner(data?.detail || "Password reset successfully", "ok");
          setForgotOpen(false);
          setLogin((prev) => ({ ...prev, password: "" }));
          setForgot({ email: "", token: "", newPassword: "" });
        } catch (err) {
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const loadAdminAuthenticatorQr = async () => {
        if (!login.username.trim() || !login.password) {
          showBanner("Enter admin username and password first.", "error");
          return;
        }
        try {
          setLoadingAdminQr(true);
          const data = await api("/api/bootstrap-admin/mfa-setup", "POST", {
            username: login.username.trim(),
            password: login.password,
          });
          setMfaSetup({ uri: data.mfa_setup_uri || "", qr: data.qr_code_data_uri || "" });
          showBanner("Authenticator QR loaded.", "ok");
        } catch (err) {
          showBanner(parseError(err), "error");
        } finally {
          setLoadingAdminQr(false);
        }
      };

      const onVerify = async () => {
        if (!mfaToken.trim()) {
          showBanner("MFA token missing. Login first.", "error");
          return;
        }
        if (otpCode.length !== 6) {
          showBanner("Enter valid 6-digit OTP.", "error");
          return;
        }

        try {
          setLoading(true);
          const data = await api("/api/verify-mfa", "POST", { mfa_token: mfaToken.trim(), otp: otpCode });
          const accessToken = data.access_token || "";
          setTokens({ access: accessToken });
          setSessionRole(roleFromJwt(accessToken));
          if (accessToken) {
            const me = await api("/api/me", "GET", null, accessToken);
            setProfile(me);
          }
          setVerified(true);
          setShowCheck(true);
          pulse(true);
          showBanner("MFA verified. Welcome!", "ok");
          setTimeout(() => {
            setShowCheck(false);
            setStep(3);
          }, 650);
        } catch (err) {
          pulse(false);
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onProfile = async () => {
        if (!tokens.access) {
          showBanner("Access token missing.", "error");
          return;
        }
        try {
          setLoading(true);
          const data = await api("/api/me", "GET", null, tokens.access);
          setProfile(data);
          pulse(true);
          showBanner("Profile fetched", "ok");
        } catch (err) {
          pulse(false);
          showBanner(parseError(err), "error");
        } finally {
          setLoading(false);
        }
      };

      const onLogout = async () => {
        try {
          await api("/api/logout", "POST", null, tokens.access || null);
        } catch {
          // We still clear local state even if backend token is already expired.
        }
        setTokens({ access: "" });
        setProfile(null);
        setSessionRole("");
        setShowUsersModal(false);
        setUsersList([]);
        setMfaToken("");
        setMfaMethod("email");
        setForgotOpen(false);
        setForgot({ email: "", token: "", newPassword: "" });
        setOtp([...initialOtp]);
        setStep(1);
        showBanner("Logged out", "ok");
      };

      const formatDate = (raw) => {
        if (!raw) return "-";
        const d = new Date(raw);
        if (Number.isNaN(d.getTime())) return "-";
        return d.toLocaleString();
      };

      const openUsersModal = async () => {
        if (!tokens.access) {
          showBanner("Verify OTP and fetch token first.", "error");
          return;
        }
        if (!isAdmin) {
          showBanner("Only admin can manage users.", "error");
          return;
        }

        setShowUsersModal(true);
        try {
          setUsersLoading(true);
          // UI interaction: load all users only when modal is opened.
          const data = await api("/api/users", "GET", null, tokens.access);
          setUsersList(Array.isArray(data) ? data : []);
        } catch (err) {
          showBanner(parseError(err), "error");
          if (err?.status === 403) {
            showBanner("Only admin can manage users.", "error");
          }
        } finally {
          setUsersLoading(false);
        }
      };

      const deleteUser = async (userId) => {
        if (!tokens.access || !userId) return;
        const target = usersList.find((u) => u.id === userId);
        if (target && target.role === "admin") {
          showBanner("Admin cannot be removed", "error");
          return;
        }
        // UI interaction: confirm before deletion to prevent accidental removal.
        const confirmed = window.confirm("Delete this user?");
        if (!confirmed) return;

        try {
          await api(`/api/users/${userId}`, "DELETE", null, tokens.access);
          // UI interaction: remove row instantly without reloading.
          setUsersList((prev) => prev.filter((u) => u.id !== userId));
          showBanner("User deleted", "ok");
        } catch (err) {
          showBanner(parseError(err), "error");
        }
      };

      const nextLabel = [
        loading ? "Creating..." : "Create Account",
        loading ? "Signing in..." : "Login",
        loading ? "Verifying..." : "Verify OTP",
        loading ? "Loading Profile..." : "Refresh Profile",
      ][step];

      const nextAction = [onRegister, onLogin, onVerify, onProfile][step];

      const prevEnabled = step > 0 && !loading && !showCheck;

      return (
        <div className="mx-auto min-h-screen w-full max-w-6xl px-4 py-5 md:px-6 md:py-10">
          <section className="glass relative flex min-h-[calc(100vh-2.5rem)] flex-col overflow-hidden rounded-[36px] border border-white/70 md:grid md:min-h-[calc(100vh-5rem)] md:grid-cols-[0.95fr_1.05fr] md:rounded-[40px]">
            <div className="absolute right-0 top-0 h-40 w-40 rounded-full bg-[radial-gradient(circle,rgba(255,107,74,0.18)_0%,transparent_70%)] blur-2xl"></div>
            <div className="absolute left-0 bottom-0 h-44 w-44 rounded-full bg-[radial-gradient(circle,rgba(15,118,110,0.14)_0%,transparent_70%)] blur-2xl"></div>
            <div className="hidden flex-col justify-between border-r border-slate-200/70 p-8 md:flex md:p-10">
              <div className="space-y-6">
                <div>
                  <p className="text-[11px] uppercase tracking-[0.22em] text-slate-500">SentinelAuth OS</p>
                  <h1 className="mt-2 font-['Fraunces'] text-4xl font-semibold leading-tight text-slate-950">Secure access that feels clean on phone and laptop.</h1>
                  <p className="mt-4 max-w-sm text-sm leading-6 text-slate-600">Same flow, different scale. The interface keeps the steps simple on small screens and opens up into a split layout on wider displays.</p>
                </div>

                <div className="grid gap-3">
                  <div className="rounded-[28px] border border-slate-200 bg-white/80 p-4 shadow-sm">
                    <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Responsive</p>
                    <p className="mt-1 text-sm text-slate-700">Single-column on mobile, split view on laptop.</p>
                  </div>
                  <div className="rounded-[28px] border border-slate-200 bg-white/80 p-4 shadow-sm">
                    <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Secure</p>
                    <p className="mt-1 text-sm text-slate-700">OTP, profile, and admin actions stay in the same flow.</p>
                  </div>
                  <div className="rounded-[28px] border border-slate-200 bg-white/80 p-4 shadow-sm">
                    <p className="text-xs uppercase tracking-[0.18em] text-slate-500">Fast</p>
                    <p className="mt-1 text-sm text-slate-700">Less crowding on desktop, no change to the backend behavior.</p>
                  </div>
                </div>
              </div>

              <div className="flex flex-wrap gap-2 text-xs text-slate-500">
                <span className="rounded-full border border-slate-200 bg-white px-3 py-1 shadow-sm">Phone friendly</span>
                <span className="rounded-full border border-slate-200 bg-white px-3 py-1 shadow-sm">Laptop friendly</span>
                <span className="rounded-full border border-slate-200 bg-white px-3 py-1 shadow-sm">Same auth flow</span>
              </div>
            </div>

            <div className="flex min-h-0 flex-1 flex-col">
              <div className="px-5 pt-6 md:px-8 md:pt-8">
              <div className="mobile-stack flex items-center justify-between gap-2">
                <div>
                  <p className="text-[11px] uppercase tracking-[0.22em] text-slate-500">SentinelAuth OS</p>
                  <h1 className="mt-1 font-['Fraunces'] text-2xl font-semibold text-slate-950 md:text-3xl">Secure Access Studio</h1>
                </div>
                <div className="mobile-stack flex items-center gap-2">
                  {isAdmin && <button onClick={openUsersModal} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 text-xs text-slate-700 shadow-sm sm:w-auto">Admin Panel</button>}
                  {tokens.access && <button onClick={onLogout} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 text-xs text-slate-700 shadow-sm sm:w-auto">Logout</button>}
                  <a href="/docs" className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 text-center text-xs text-slate-700 shadow-sm sm:w-auto">API</a>
                </div>
              </div>

              <div className="mt-5 flex items-center gap-2">
                {steps.map((s, idx) => (
                  <div key={s.id} className="flex-1">
                    <div className={cls(
                      "h-1.5 rounded-full transition-all",
                      idx <= step ? "bg-[linear-gradient(90deg,#ff6b4a_0%,#ff9f43_100%)]" : "bg-slate-200"
                    )}></div>
                  </div>
                ))}
              </div>

              <div className="mt-3 flex justify-between text-[11px] text-slate-500">
                <span>Step {step + 1} of 4</span>
                <span>{steps[step].label}</span>
              </div>

              {banner.text && (
                <div className={cls(
                  "mt-4 rounded-xl border px-3 py-2 text-xs animate-fadeUp",
                  banner.type === "error" ? "border-rose-300 bg-rose-50 text-rose-700" : "border-emerald-300 bg-emerald-50 text-emerald-700"
                )}>
                  {banner.text}
                </div>
              )}
              </div>

              <div className="flex-1 min-h-0 overflow-y-auto px-5 pt-5 pb-4 animate-slideIn md:px-8 md:pt-6">
              {step === 0 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="font-['Fraunces'] text-2xl font-semibold text-slate-950">Create Account</h2>
                    <p className="text-sm text-slate-600">Set up account + MFA in one smooth flow.</p>
                  </div>

                  <FloatingInput id="reg-user" label="Username" value={reg.username} onChange={(e) => setReg({ ...reg, username: e.target.value })} error={errors.username} icon="👤" />
                  <FloatingInput id="reg-email" label="Email" value={reg.email} onChange={(e) => setReg({ ...reg, email: e.target.value })} error={errors.email} icon="✉" />
                  <FloatingInput id="reg-pass" type="password" label="Password" value={reg.password} onChange={(e) => setReg({ ...reg, password: e.target.value })} error={errors.password} icon="🔒" />
                  <PasswordStrength password={reg.password} />

                  <button onClick={() => setStep(1)} className="rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm">Already have an account? Login</button>

                  {!!mfaSetup.qr && (
                    <div className="space-y-2 rounded-[28px] border border-slate-200 bg-white p-3 shadow-sm">
                      <p className="text-xs text-slate-600">Scan this QR in Authenticator:</p>
                      <img src={mfaSetup.qr} alt="MFA QR" className="mx-auto w-44 rounded-2xl bg-white p-2 shadow-sm" />
                      <a href={mfaSetup.uri} className="inline-flex w-full items-center justify-center rounded-xl border border-accent/30 px-2 py-2 text-center text-[11px] font-semibold text-accent">Open app</a>
                    </div>
                  )}
                </div>
              )}

              {step === 1 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="font-['Fraunces'] text-2xl font-semibold text-slate-950">Login</h2>
                    <p className="text-sm text-slate-600">Use your account to request OTP challenge.</p>
                  </div>

                  {!!mfaSetup.qr && (
                    <div className="space-y-2 rounded-[28px] border border-slate-200 bg-white p-3 shadow-sm">
                      <p className="text-xs text-slate-600">Scan this QR in Authenticator (if not done yet):</p>
                      <img src={mfaSetup.qr} alt="MFA QR" className="mx-auto w-44 rounded-2xl bg-white p-2 shadow-sm" />
                      <a href={mfaSetup.uri} className="inline-flex w-full items-center justify-center rounded-xl border border-accent/30 px-2 py-2 text-center text-[11px] font-semibold text-accent">Open app</a>
                    </div>
                  )}

                  <FloatingInput id="login-user" label="Username" value={login.username} onChange={(e) => setLogin({ ...login, username: e.target.value })} icon="👤" />
                  <FloatingInput id="login-pass" type="password" label="Password" value={login.password} onChange={(e) => setLogin({ ...login, password: e.target.value })} icon="🔑" />
                  <p className="text-xs text-slate-500">Admin Panel appears after successful admin OTP login.</p>
                  {mfaMethod === "totp" && login.username.trim() && (
                    <button onClick={loadAdminAuthenticatorQr} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm" disabled={loadingAdminQr}>
                      {loadingAdminQr ? "Loading Authenticator QR..." : "Show Admin Authenticator QR"}
                    </button>
                  )}

                  <button onClick={() => setForgotOpen((v) => !v)} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm">
                    {forgotOpen ? "Hide Forgot Password" : "Forgot Password?"}
                  </button>

                  {forgotOpen && (
                    <div className="space-y-3 rounded-[28px] border border-slate-200 bg-white p-3 shadow-sm">
                      <p className="text-xs text-slate-600">Request a reset token by email, then set a new password.</p>
                      <FloatingInput id="forgot-email" label="Account Email" value={forgot.email} onChange={(e) => setForgot({ ...forgot, email: e.target.value })} icon="✉" />
                      <button onClick={onForgotPasswordRequest} className="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">
                        Send Reset Token
                      </button>
                      <FloatingInput id="forgot-token" label="Reset Token" value={forgot.token} onChange={(e) => setForgot({ ...forgot, token: e.target.value })} icon="🔐" />
                      <FloatingInput id="forgot-new-pass" type="password" label="New Password" value={forgot.newPassword} onChange={(e) => setForgot({ ...forgot, newPassword: e.target.value })} icon="🆕" />
                      <PasswordStrength password={forgot.newPassword} />
                      <p className="text-xs text-slate-600">Password rules: at least 12 characters with uppercase, lowercase, number, and special character.</p>
                      <button onClick={onResetPassword} className="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">
                        Reset Password
                      </button>
                    </div>
                  )}
                  <button onClick={() => setStep(0)} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm">New here? Create Account</button>
                </div>
              )}

              {step === 2 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="font-['Fraunces'] text-2xl font-semibold text-slate-950">Verify OTP</h2>
                    <p className="text-sm text-slate-600">
                      {mfaMethod === "email" ? "Enter 6-digit code from your email." : "Enter 6-digit code from authenticator app."}
                    </p>
                  </div>

                  <div className="rounded-[28px] border border-slate-200 bg-white p-3 shadow-sm">
                    <label className="mb-1 block text-xs text-slate-600">MFA Token</label>
                    <textarea value={mfaToken} onChange={(e) => setMfaToken(e.target.value)} rows="2" className="w-full rounded-2xl border border-slate-200 bg-slate-50 p-2 text-xs outline-none" />
                    <button onClick={() => copy(mfaToken, "MFA token")} className="mt-2 rounded-xl border border-slate-200 bg-white px-3 py-1.5 text-xs text-slate-700 shadow-sm">Copy token</button>
                  </div>

                  <OtpSlots values={otp} setValues={setOtp} />

                  {showCheck && (
                    <div className="rounded-[28px] border border-emerald-200 bg-emerald-50 p-4 text-center animate-pop">
                      <div className="mx-auto mb-2 grid h-12 w-12 place-items-center rounded-full bg-emerald-500/10 text-2xl text-emerald-700">✓</div>
                      <p className="text-sm text-emerald-700">Verified successfully</p>
                    </div>
                  )}
                </div>
              )}

              {step === 3 && (
                <div className="space-y-4">
                  <div>
                    <h2 className="font-['Fraunces'] text-2xl font-semibold text-slate-950">Profile Access</h2>
                    <p className="text-sm text-slate-600">Session is active. Use secure actions below.</p>
                  </div>

                  {isAdmin && (
                    <button onClick={openUsersModal} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm">
                      Open Admin Panel
                    </button>
                  )}

                  <div className="rounded-[28px] border border-slate-200 bg-white p-3 text-sm text-slate-600 shadow-sm">
                    Access token is kept in memory and refresh token is stored in a secure HttpOnly cookie.
                  </div>

                  <button onClick={onLogout} className="rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm">Logout</button>

                  {profile && (
                    <pre className="max-h-44 overflow-auto rounded-[28px] border border-slate-200 bg-white p-3 text-xs text-slate-700 shadow-sm">
                      {JSON.stringify(profile, null, 2)}
                    </pre>
                  )}
                </div>
              )}
            </div>

              <div className="mt-auto border-t border-slate-200/80 bg-white/80 px-5 pb-[calc(1rem+env(safe-area-inset-bottom))] pt-3 backdrop-blur md:px-8">
              <div className="mb-2 flex items-center justify-between text-xs text-slate-500">
                <button disabled={!prevEnabled} onClick={() => setStep((s) => Math.max(0, s - 1))} className="disabled:opacity-40">Back</button>
                <span>{steps[step].label}</span>
              </div>
              <RippleButton label={nextLabel} onClick={nextAction} disabled={loading || showCheck} />
            </div>

              {showUsersModal && (
              <div className="fixed inset-0 z-30 grid place-items-end bg-slate-950/35 p-4 backdrop-blur-sm sm:place-items-center">
                <div className="glass w-full max-w-md rounded-[32px] border border-slate-200 p-4">
                  <div className="mb-3 flex items-center justify-between">
                    <h3 className="text-sm font-semibold text-slate-900">Admin Panel</h3>
                    <button onClick={() => setShowUsersModal(false)} className="rounded-xl border border-slate-200 bg-white px-2 py-1 text-xs text-slate-700">Close</button>
                  </div>

                  {usersLoading ? (
                    <p className="text-xs text-slate-600">Loading users...</p>
                  ) : usersList.length === 0 ? (
                    <p className="text-xs text-slate-600">No users found.</p>
                  ) : (
                    <div className="max-h-[60vh] space-y-2 overflow-auto pr-1">
                      <div className="grid grid-cols-[1.2fr_1fr_auto] gap-2 rounded-xl border border-slate-200 bg-slate-50 px-2 py-1 text-[11px] text-slate-500">
                        <span>Email / Username</span>
                        <span>User ID</span>
                        <span>Action</span>
                      </div>
                      {usersList.map((u) => (
                        <div key={u.id} className="rounded-xl border border-slate-200 bg-white p-2.5 text-xs shadow-sm">
                          <div className="grid grid-cols-[1.2fr_1fr_auto] items-center gap-2">
                            <div>
                              <p className="truncate font-semibold text-slate-900">{u.email || u.username}</p>
                              <p className="text-[11px] text-slate-500">{formatDate(u.created_at)}</p>
                            </div>
                            <p className="truncate text-slate-600">{u.id}</p>
                            {u.role === "admin" ? (
                              <span className="rounded-lg border border-amber-200 bg-amber-50 px-2 py-1 text-amber-700">Protected</span>
                            ) : (
                              <button onClick={() => deleteUser(u.id)} className="rounded-lg border border-rose-200 bg-rose-50 px-2 py-1 text-rose-700">Delete</button>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              )}
            </div>
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
